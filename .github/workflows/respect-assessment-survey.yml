name: Respect Assessment Survey Hosting

on:
  push:
    branches:
      - RESPECTify

jobs:
  build:
    name: Build FTM Hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Setup java
        uses: actions/setup-java@v1
        with:
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v1
        with:
          node-version: 18.x

      - name: Install app dependencies
        run: npm install

      # - name: Store variables
      #   run: |
      #     touch .env
      #     echo 'REACT_APP_GITHUB_BASE=/cuba' >> .env

      - name: Build
        run: npm run build

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@v13.0.3
        with:
          args: deploy --project ${{ secrets.FIREBASE_PROJECT_ID }} --only hosting:ibiza-stage-assessment-respect
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

